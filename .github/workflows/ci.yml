# CI: the same gates as local development — `make lint` and the test
# suite — plus a build check. Nothing here is decorative: every job must
# pass before a change lands, and the lint job is the hardening gate
# (style, strict types, security static analysis, dependency audit).
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e '.[dev,keyring]'
      - run: ruff check src tests scripts
      - run: mypy
      - run: bandit -r src -q
      # Audits the environment the suite actually runs in. --skip-editable
      # excludes only the muster checkout itself, which is not on PyPI.
      - run: pip-audit --skip-editable

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e '.[dev,keyring]'
      - run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
